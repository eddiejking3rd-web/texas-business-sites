<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanks — Waco Business Solutions</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a; color: #e2e8f0; line-height: 1.6;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .card {
            background: #1e293b; border: 1px solid #334155; border-radius: 16px;
            padding: 3rem; text-align: center; max-width: 500px; margin: 2rem;
        }
        .check { font-size: 4rem; margin-bottom: 1rem; }
        h1 { font-size: 1.8rem; margin-bottom: 0.5rem; background: linear-gradient(135deg, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        p { color: #94a3b8; margin: 0.5rem 0; }
        .btn { display: inline-block; margin-top: 1.5rem; background: linear-gradient(135deg, #60a5fa, #3b82f6); color: #fff; text-decoration: none; padding: 0.75rem 2rem; border-radius: 10px; font-weight: 600; }
        .btn:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div class="card">
        <div class="check">✅</div>
        <h1>Thank You!</h1>
        <p>Your payment is being processed by Stripe.</p>
        <p style="font-size: 0.9rem; color: #64748b;">You'll receive a confirmation email shortly.</p>
        <a href="http://203.161.33.5:5050/" class="btn">← Back to Sites</a>
    </div>
</body>
</html>
