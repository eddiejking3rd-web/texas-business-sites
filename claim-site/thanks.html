<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You!</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #f0fdf4; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { text-align: center; padding: 60px; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); max-width: 500px; }
        .icon { font-size: 5rem; margin-bottom: 20px; }
        h1 { color: #16a34a; margin-bottom: 12px; }
        p { color: #64748b; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🎉</div>
        <h1>Payment Successful!</h1>
        <p>Thank you for your purchase. We'll be in touch within 24 hours to get your professional website built and live.</p>
        <p style="margin-top: 16px;">Check your email for the receipt from Stripe.</p>
    </div>
</body>
</html>
